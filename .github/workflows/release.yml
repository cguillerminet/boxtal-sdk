name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # for creating the GitHub Release
  id-token: write   # for npm provenance attestation

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@cygt/boxtal-sdk
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - run: npm ci

      - name: Verify git tag matches package.json version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "$TAG_NAME" ]; then
            echo "::error::Git tag $TAG_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ""
        run: npm publish --provenance

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --generate-notes \
            --verify-tag
